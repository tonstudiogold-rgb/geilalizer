name: macOS build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build standalone app
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DGEILALIZER_ENABLE_NAMCORE=ON

      - name: Build app and smoke tests
        run: cmake --build build --config Release --parallel --target Geilalizer CoreSmoke NamAdapterSmoke ProductE2E FunctionalSmoke SignalChainProbeSmoke SignalIrAudit TapeMachineBehavior RepositoryPolicySmoke RealtimeCallbackSourceAudit RealtimePlaybackStress MachinePrepareAssetPolicy LimiterBypassClickPolicy OfflineRenderSlice

      - name: Run smoke tests
        run: ctest --test-dir build --output-on-failure -C Release

      - name: Package app bundle
        run: |
          set -euo pipefail
          APP_PATH="build/Geilalizer_artefacts/Release/24-Track Standalone Geilalizer.app"
          test -d "$APP_PATH"
          mkdir -p dist
          ditto -c -k --keepParent "$APP_PATH" "dist/24-Track Standalone Geilalizer-macOS.zip"
          hdiutil create -volname "24-Track Standalone Geilalizer" \
            -srcfolder "$APP_PATH" \
            -ov -format UDZO \
            "dist/24-Track Standalone Geilalizer-macOS.dmg"
          cp "dist/24-Track Standalone Geilalizer-macOS.zip" "dist/geilalizer-macos.zip"
          cp "dist/24-Track Standalone Geilalizer-macOS.dmg" "dist/geilalizer-macos.dmg"
          shasum -a 256 "dist/24-Track Standalone Geilalizer-macOS.zip" > "dist/24-Track Standalone Geilalizer-macOS.zip.sha256"
          shasum -a 256 "dist/24-Track Standalone Geilalizer-macOS.dmg" > "dist/24-Track Standalone Geilalizer-macOS.dmg.sha256"
          shasum -a 256 "dist/geilalizer-macos.zip" > "dist/geilalizer-macos.zip.sha256"
          shasum -a 256 "dist/geilalizer-macos.dmg" > "dist/geilalizer-macos.dmg.sha256"

      - name: Upload release assets fallback
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="macos-latest"
          TITLE="Geilalizer macOS latest"
          BODY="Automated macOS build for ${GITHUB_SHA}. This release is overwritten by later main builds."
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "$TITLE" --notes "$BODY"
          else
            gh release create "$TAG" --title "$TITLE" --notes "$BODY" --target "$GITHUB_SHA"
          fi
          gh release upload "$TAG" \
            "dist/geilalizer-macos.zip" \
            "dist/geilalizer-macos.zip.sha256" \
            "dist/geilalizer-macos.dmg" \
            "dist/geilalizer-macos.dmg.sha256" \
            --clobber

      - name: Upload app artifact
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: Geilalizer-macOS
          path: |
            dist/24-Track Standalone Geilalizer-macOS.zip
            dist/24-Track Standalone Geilalizer-macOS.zip.sha256
            dist/24-Track Standalone Geilalizer-macOS.dmg
            dist/24-Track Standalone Geilalizer-macOS.dmg.sha256
            dist/geilalizer-macos.zip
            dist/geilalizer-macos.zip.sha256
            dist/geilalizer-macos.dmg
            dist/geilalizer-macos.dmg.sha256
